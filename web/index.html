  <!-- Inline critical CSS for splash: zero external requests, renders instantly -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0F0D0B;overflow:hidden}
    #flutter-loading-screen{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at center, #171411 0%, #0F0D0B 100%);
      z-index:9999;
      transition:opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    
    #flutter-loading-screen::before {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, rgba(212, 175, 55, 0) 70%);
      border-radius: 50%;
      animation: pulse-glow 6s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 2;
    }
    
    /* Background video elements */
    video#splash-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 3;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    video#splash-video.loaded {
      opacity: 1; /* Shows the full original colors of the video */
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 40%, rgba(15,13,11,0.5) 100%);
      z-index: 4;
      pointer-events: none;
    }

    #flutter-loading-screen.hidden{opacity:0;pointer-events:none}
    
    /* Sleek premium loading line positioned at the bottom */
    .oe-progress-container {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 2px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 1px;
      overflow: hidden;
      opacity: 0;
      z-index: 10;
      animation: fade-in 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }
    .oe-progress-bar {
      position: absolute;
      height: 100%;
      width: 70px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      animation: loading-flow 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes pulse-glow {
      0% { transform: scale(0.95); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 0.9; }
    }
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes loading-flow {
      0% { left: -70px; }
      100% { left: 180px; }
    }
  </style>
</head>
<body>
  <!-- Native splash shown immediately — zero flicker, no blank white -->
  <div id="flutter-loading-screen" aria-label="Loading Om Events…" role="progressbar">
    <!-- Video background -->
    <video id="splash-video" autoplay muted playsinline onplaying="this.classList.add('loaded')">
      <source src="https://kwegyvbgdaednljyhcgm.supabase.co/storage/v1/object/public/gallery/Video/splash_screen.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    
    <div class="oe-progress-container">
      <div class="oe-progress-bar"></div>
    </div>
  </div>

  <script>
    var isFlutterReady = false;
    var isMinTimePassed = false;
    var splashRemoved = false;

    function removeSplash() {
      if (isFlutterReady && isMinTimePassed && !splashRemoved) {
        splashRemoved = true;
        var splash = document.getElementById('flutter-loading-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 600);
        }
      }
    }

    // Remove splash once Flutter engine signals it is ready
    window.addEventListener('flutter-first-frame', function() {
      isFlutterReady = true;
      removeSplash();
    });

    // When the video ends, fade it out to show the gold glow loader underneath (if Flutter is not ready yet)
    var video = document.getElementById('splash-video');
    if (video) {
      video.addEventListener('ended', function() {
        video.classList.remove('loaded');
      });
    }

    // Set minimum display time to exactly 10 seconds
    setTimeout(function() {
      isMinTimePassed = true;
      removeSplash();
    }, 10000);
  </script>

  <!-- Register Firebase Messaging Service Worker for background push notifications -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/firebase-messaging-sw.js', { scope: '/' })
        .then(function (registration) {
          console.log('[SW] Firebase Messaging SW registered:', registration.scope);
        })
        .catch(function (err) {
          console.warn('[SW] Firebase Messaging SW registration failed:', err);
        });
    }
  </script>
