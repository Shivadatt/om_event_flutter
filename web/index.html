  <!-- Inline critical CSS for splash: zero external requests, renders instantly -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0F0D0B;overflow:hidden}
    #flutter-loading-screen{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background: #0F0D0B;
      z-index:9999;
      transition:opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    
    /* Background video elements */
    video#splash-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 1; /* Shows the video directly and immediately */
    }

    #flutter-loading-screen.hidden{opacity:0;pointer-events:none}
  </style>
</head>
<body>
  <!-- Native splash shown immediately — zero flicker, no blank white -->
  <div id="flutter-loading-screen" aria-label="Loading Om Events…" role="progressbar">
    <!-- Video background -->
    <video id="splash-video" autoplay muted playsinline preload="auto">
      <source src="splash_screen.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    var isFlutterReady = false;
    var isMinTimePassed = false;
    var splashRemoved = false;

    function removeSplash() {
      if (isFlutterReady && isMinTimePassed && !splashRemoved) {
        splashRemoved = true;
        var splash = document.getElementById('flutter-loading-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 600);
        }
      }
    }

    // Remove splash once Flutter engine signals it is ready
    window.addEventListener('flutter-first-frame', function() {
      isFlutterReady = true;
      removeSplash();
    });

    // Start the 10-second timer ONLY when the video actually starts playing
    var video = document.getElementById('splash-video');
    if (video) {
      video.addEventListener('playing', function() {
        setTimeout(function() {
          isMinTimePassed = true;
          removeSplash();
        }, 10000); // 10 seconds of actual video play time
      });
    } else {
      // Fallback if video is missing
      setTimeout(function() {
        isMinTimePassed = true;
        removeSplash();
      }, 10000);
    }
  </script>

  <!-- Register Firebase Messaging Service Worker for background push notifications -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/firebase-messaging-sw.js', { scope: '/' })
        .then(function (registration) {
          console.log('[SW] Firebase Messaging SW registered:', registration.scope);
        })
        .catch(function (err) {
          console.warn('[SW] Firebase Messaging SW registration failed:', err);
        });
    }
  </script>

</body>
