<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bespoke event styling and transparent instant quotations for weddings, birthdays, proposals, baby celebrations and corporate events.">
  <meta name="keywords" content="om events, event planner gujarat, wedding decorator ahmedabad, balloon decoration kadi, stage decoration Thangadh, live quotes">
  <meta name="author" content="Om Events Team">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#15211e">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Om Events — Celebrations, thoughtfully composed.">
  <meta property="og:description" content="Bespoke event styling and transparent instant quotations for weddings, birthdays, proposals, baby celebrations and corporate events.">
  <meta property="og:image" content="https://omevents.in/assets/images/wedding-stage.jpg">
  <meta property="og:url" content="https://omevents.in">
  <meta property="og:site_name" content="Om Events Gujarat">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Om Events — Celebrations, thoughtfully composed.">
  <meta name="twitter:description" content="Bespoke event styling and transparent instant quotations for weddings, birthdays, proposals, baby celebrations and corporate events.">
  <meta name="twitter:image" content="https://omevents.in/assets/images/wedding-stage.jpg">
  <meta name="twitter:site" content="@OmEvents">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Om Events">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- DNS Prefetch & Preconnect for Firebase & Fonts -->
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts: non-blocking load -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Italiana&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Italiana&display=swap" rel="stylesheet"></noscript>

  <title>Om Events — Celebrations, thoughtfully composed.</title>

  <!-- Schema.org JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Om Events",
    "image": "assets/images/wedding-stage.jpg",
    "telephone": "+91 9512149944",
    "email": "omeventsanddecorators@gmail.com",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Medha (kadi-kalyanpura road), Branch-2: Thangadh",
      "addressLocality": "Kadi",
      "addressRegion": "Gujarat",
      "postalCode": "382715",
      "addressCountry": "IN"
    },
    "url": "https://omevents.in"
  }
  </script>
  <link rel="manifest" href="manifest.json">

  <!-- Inline critical CSS for splash: zero external requests, renders instantly -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#15211e;overflow:hidden}
    #flutter-loading-screen{
      position:fixed;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#15211e;
      z-index:9999;
      transition:opacity .4s ease;
    }
    #flutter-loading-screen.hidden{opacity:0;pointer-events:none}
    .oe-logo{
      font-family:'Georgia',serif;
      font-size:52px;
      color:#c9a77e;
      letter-spacing:6px;
      line-height:1;
      margin-bottom:8px;
    }
    .oe-tagline{
      font-family:'Georgia',serif;
      font-size:12px;
      color:rgba(201,167,126,.55);
      letter-spacing:3px;
      text-transform:uppercase;
      margin-bottom:48px;
    }
    .oe-spinner{
      width:36px;height:36px;
      border:2px solid rgba(201,167,126,.2);
      border-top-color:#c9a77e;
      border-radius:50%;
      animation:oe-spin .9s linear infinite;
    }
    @keyframes oe-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Native splash shown immediately — zero flicker, no blank white -->
  <div id="flutter-loading-screen" aria-label="Loading Om Events…" role="progressbar">
    <div class="oe-logo">OE</div>
    <div class="oe-tagline">Celebrations, thoughtfully composed</div>
    <div class="oe-spinner"></div>
  </div>

  <script>
    // Remove splash once Flutter engine signals it is ready
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-loading-screen');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 450);
      }
    });
  </script>

  <!-- Register Firebase Messaging Service Worker for background push notifications -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('firebase-messaging-sw.js')
        .then(function (registration) {
          console.log('[SW] Firebase Messaging SW registered:', registration.scope);
        })
        .catch(function (err) {
          console.warn('[SW] Firebase Messaging SW registration failed:', err);
        });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
